<!DOCTYPE html>
<html>

<head>
    <title>Plant Disease Detection</title>
    <style>
        body {
            font-family: Arial;
            background: #0a1a0a;
            color: white;
            padding: 20px;
            margin: 0
        }

        h1 {
            color: #4caf50
        }

        .card {
            background: #1a2e1a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #2e4e2e;
            text-align: left
        }

        th {
            background: #2e4e2e
        }

        .Blight {
            background: #e53935;
            color: white;
            padding: 4px 10px;
            border-radius: 20px
        }

        .Common_Rust {
            background: #ff9800;
            color: black;
            padding: 4px 10px;
            border-radius: 20px
        }

        .Gray_Leaf_Spot {
            background: #9e9e9e;
            color: black;
            padding: 4px 10px;
            border-radius: 20px
        }

        .Healthy {
            background: #4caf50;
            color: black;
            padding: 4px 10px;
            border-radius: 20px
        }

        .status {
            font-size: 12px;
            color: #888
        }
    </style>
</head>

<body>
    <h1>🌿 Plant Disease Detection Dashboard</h1>
    <div class="card">
        <h2>Latest Detections — ESP32-CAM</h2>
        <p class="status" id="status">Fetching results...</p>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Timestamp</th>
                    <th>Disease Detected</th>
                    <th>Confidence</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
    <script>
        async function load() {
            const res = await fetch("/results");
            const data = await res.json();
            let html = "";
            data.data.forEach(r => {
                html += `<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
<td><span class="${r[2]}">${r[2].replace("_", " ")}</span></td>
<td>${(r[3] * 100).toFixed(1)}%</td>
</tr>`;
            });
            document.getElementById("tbody").innerHTML = html;
            document.getElementById("status").innerText = "Last updated: " + new Date().toLocaleTimeString();
        }
        load();
        setInterval(load, 10000);
    </script>
</body>

</html>
