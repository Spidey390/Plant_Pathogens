<!DOCTYPE html>
<html>
<head>
<title>Plant Disease Detection</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;background:#0a1a0a;color:white;padding:20px}
h1{color:#4caf50;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.card{background:#1a2e1a;padding:20px;border-radius:10px}
h2{color:#81c784;margin-bottom:15px;font-size:16px}
video,canvas{width:100%;border-radius:8px;background:#000;display:block}
canvas{display:none}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold;margin:5px;width:calc(50% - 10px)}
.btn-green{background:#4caf50;color:black}
.btn-red{background:#e53935;color:white}
.btn-blue{background:#1976d2;color:white}
.btn-gray{background:#555;color:white}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.upload-area{border:2px dashed #4caf50;border-radius:8px;padding:30px;text-align:center;cursor:pointer;margin-bottom:10px;transition:background 0.2s}
.upload-area:hover{background:#1e3e1e}
input[type=file]{display:none}
.preview-img{width:100%;border-radius:8px;margin-top:10px;display:none}
.result-box{background:#0d1f0d;border:1px solid #2e4e2e;border-radius:8px;padding:15px;margin-top:15px;min-height:60px;text-align:center}
.result-label{font-size:24px;font-weight:bold;margin-bottom:5px}
.confidence{color:#aaa;font-size:14px}
.Blight{color:#ef5350}
.Common_Rust{color:#ff9800}
.Gray_Leaf_Spot{color:#bdbdbd}
.Healthy{color:#66bb6a}
.badge{padding:4px 12px;border-radius:20px;font-size:13px;display:inline-block}
.badge.Blight{background:#e53935}
.badge.Common_Rust{background:#ff9800;color:black}
.badge.Gray_Leaf_Spot{background:#9e9e9e;color:black}
.badge.Healthy{background:#4caf50;color:black}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border:1px solid #2e4e2e;text-align:left;font-size:13px}
th{background:#2e4e2e}
.status{font-size:12px;color:#888;margin-bottom:10px}
.live-badge{background:#e53935;color:white;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:8px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.tab-btns{display:flex;margin-bottom:15px}
.tab-btn{padding:8px 20px;border:none;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;background:#0d1f0d;color:#aaa;margin-right:5px}
.tab-btn.active{background:#2e4e2e;color:white}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<h1>🌿 Plant Disease Detection</h1>

<div class="grid">

  <!-- LEFT — Camera + Upload -->
  <div class="card">
    <div class="tab-btns">
      <button class="tab-btn active" onclick="switchTab('camera')">📷 Live Camera</button>
      <button class="tab-btn" onclick="switchTab('upload')">📁 Upload Photo</button>
    </div>

    <!-- Camera Tab -->
    <div id="cameraTab">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <div style="margin-top:10px;text-align:center">
        <button class="btn btn-green" id="startBtn" onclick="startCamera()">▶ Start Camera</button>
        <button class="btn btn-red" id="stopBtn" onclick="stopCamera()" disabled>■ Stop</button>
        <button class="btn btn-blue" id="captureBtn" onclick="captureAndPredict()" disabled style="width:calc(100% - 10px);margin-top:5px">🔍 Capture & Predict</button>
        <button class="btn btn-gray" id="liveBtn" onclick="toggleLive()" disabled style="width:calc(100% - 10px);margin-top:5px">🔴 Start Live Predict</button>
      </div>
      <div class="result-box" id="cameraResult">
        <span style="color:#555">Start camera and click Capture & Predict</span>
      </div>
    </div>

    <!-- Upload Tab -->
    <div id="uploadTab" style="display:none">
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div style="font-size:40px">📁</div>
        <div style="margin-top:10px;color:#aaa">Click to select image</div>
        <div style="font-size:12px;color:#666;margin-top:5px">JPG, PNG supported</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="previewAndPredict(event)">
      <img id="previewImg" class="preview-img">
      <button class="btn btn-blue" id="uploadPredictBtn" onclick="predictUpload()" disabled style="width:100%;margin-top:10px">🔍 Predict</button>
      <div class="result-box" id="uploadResult">
        <span style="color:#555">Select an image to predict</span>
      </div>
    </div>
  </div>

  <!-- RIGHT — Results Table -->
  <div class="card">
    <h2>📋 Detection History <span id="liveDot"></span></h2>
    <p class="status" id="status">Loading...</p>
    <table>
      <thead>
        <tr><th>ID</th><th>Time</th><th>Disease</th><th>Confidence</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script>
let stream = null;
let liveInterval = null;
let isLive = false;
let uploadedFile = null;

function switchTab(tab) {
  document.getElementById('cameraTab').style.display = tab === 'camera' ? 'block' : 'none';
  document.getElementById('uploadTab').style.display = tab === 'upload' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'camera') || (i === 1 && tab === 'upload'));
  });
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    document.getElementById('video').srcObject = stream;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('captureBtn').disabled = false;
    document.getElementById('liveBtn').disabled = false;
  } catch(e) {
    alert('Camera access denied. Please allow camera permission.');
  }
}

function stopCamera() {
  if(liveInterval) toggleLive();
  if(stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  document.getElementById('video').srcObject = null;
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('captureBtn').disabled = true;
  document.getElementById('liveBtn').disabled = true;
}

function captureFrame() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  return new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
}

async function captureAndPredict() {
  const blob = await captureFrame();
  const result = await sendToAPI(blob);
  showResult('cameraResult', result);
}

function toggleLive() {
  isLive = !isLive;
  const btn = document.getElementById('liveBtn');
  const dot = document.getElementById('liveDot');
  if(isLive) {
    btn.textContent = '⏹ Stop Live Predict';
    btn.className = 'btn btn-red';
    dot.innerHTML = '<span class="live-badge">LIVE</span>';
    liveInterval = setInterval(async () => {
      const blob = await captureFrame();
      const result = await sendToAPI(blob);
      showResult('cameraResult', result);
      loadHistory();
    }, 5000);
  } else {
    btn.textContent = '🔴 Start Live Predict';
    btn.className = 'btn btn-gray';
    dot.innerHTML = '';
    clearInterval(liveInterval);
    liveInterval = null;
  }
}

function previewAndPredict(event) {
  uploadedFile = event.target.files[0];
  if(!uploadedFile) return;
  const url = URL.createObjectURL(uploadedFile);
  const img = document.getElementById('previewImg');
  img.src = url;
  img.style.display = 'block';
  document.getElementById('uploadPredictBtn').disabled = false;
  document.getElementById('uploadResult').innerHTML = '<span style="color:#aaa">Click Predict to analyze</span>';
}

async function predictUpload() {
  if(!uploadedFile) return;
  const result = await sendToAPI(uploadedFile);
  showResult('uploadResult', result);
}

async function sendToAPI(blob) {
  const formData = new FormData();
  formData.append('file', blob, 'image.jpg');
  try {
    const res = await fetch('/predict', { method: 'POST', body: formData });
    return await res.json();
  } catch(e) {
    return { error: 'Server error. Try again.' };
  }
}

function showResult(elementId, result) {
  const el = document.getElementById(elementId);
  if(result.error) {
    el.innerHTML = `<span style="color:#ef5350">${result.error}</span>`;
    return;
  }
  const disease = result.disease;
  const confidence = (result.confidence * 100).toFixed(1);
  el.innerHTML = `
    <div class="result-label ${disease}">${disease.replace('_', ' ')}</div>
    <div class="confidence">Confidence: ${confidence}%</div>
    <div style="margin-top:8px;font-size:12px;color:#555">${result.timestamp}</div>
  `;
}

async function loadHistory() {
  try {
    const res = await fetch('/results');
    const data = await res.json();
    let html = '';
    data.data.forEach(r => {
      html += `<tr>
        <td>${r[0]}</td>
        <td style="font-size:11px">${r[1].replace('T',' ').slice(0,19)}</td>
        <td><span class="badge ${r[2]}">${r[2].replace('_',' ')}</span></td>
        <td>${(r[3]*100).toFixed(1)}%</td>
      </tr>`;
    });
    document.getElementById('tbody').innerHTML = html;
    document.getElementById('status').innerText = 'Updated: ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('status').innerText = 'Failed to load history';
  }
}

loadHistory();
setInterval(loadHistory, 10000);
</script>
</body>
</html>
